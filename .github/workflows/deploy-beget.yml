name: Promote to Production (Beget)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (format: vX.Y.Z)"
        required: true
      change_reason:
        description: "Reason for production promotion"
        required: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Release metadata
        run: |
          echo "Release tag: ${{ inputs.release_tag }}"
          echo "Reason: ${{ inputs.change_reason }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Validate release tag format and resolve commit
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$'; then
            echo "release_tag must match vX.Y.Z (or pre-release suffix), got: $TAG"
            exit 1
          fi

          git fetch --tags --force
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG was not found in repository"
            exit 1
          fi

          TARGET_SHA="$(git rev-list -n 1 "$TAG")"
          echo "TARGET_SHA=$TARGET_SHA" >> "$GITHUB_ENV"

      - name: Verify changelog entry and structure for release tag
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ inputs.release_tag }}" REQUIRE_ALL_CORE_SECTIONS=true ENFORCE_SEMVER_BUMP_POLICY=true node scripts/validate-changelog.mjs

      - name: Verify commit belongs to develop
        run: |
          set -euo pipefail
          git fetch origin develop
          if ! git merge-base --is-ancestor "$TARGET_SHA" "origin/develop"; then
            echo "release tag commit is not contained in develop branch history"
            exit 1
          fi

      - name: Verify successful staging deployment for commit
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'deploy-beget-staging.yml';
            const targetSha = process.env.TARGET_SHA;

            const { owner, repo } = context.repo;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              branch: 'develop',
              status: 'completed',
              per_page: 100,
            });

            const matched = runs.data.workflow_runs.find((run) => {
              return run.head_sha === targetSha && run.conclusion === 'success';
            });

            if (!matched) {
              core.setFailed(`No successful staging workflow run found for commit ${targetSha}`);
              return;
            }

            core.info(`Staging verification passed via run #${matched.run_number} (${matched.html_url})`);
        env:
          TARGET_SHA: ${{ env.TARGET_SHA }}

      - name: Verify release commit policy (Conventional Commits + semver bump)
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ inputs.release_tag }}" node scripts/validate-release-commits.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BEGET_HOST }}
          username: ${{ secrets.BEGET_USERNAME }}
          key: ${{ secrets.BEGET_SSH_KEY }}
          port: ${{ secrets.BEGET_PORT }}
          script_stop: true
          script: |
            set -e
            export APP_DIR=/var/www/ai-trainer/current
            export DEPLOY_REF=${{ inputs.release_tag }}
            export PM2_ECOSYSTEM=ecosystem.config.cjs
            bash /var/www/ai-trainer/current/deploy/update.sh