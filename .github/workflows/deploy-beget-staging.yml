name: Build and Deploy Staging to Beget

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
    steps:
      - name: Deploy staging over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BEGET_STAGING_HOST }}
          username: ${{ secrets.BEGET_STAGING_USERNAME }}
          key: ${{ secrets.BEGET_STAGING_SSH_KEY }}
          port: ${{ secrets.BEGET_STAGING_PORT }}
          script_stop: true
          script: |
            set -e
            export APP_DIR=/var/www/ai-trainer-staging/current
            export DEPLOY_BRANCH=develop
            export PM2_ECOSYSTEM=ecosystem.staging.config.cjs
            bash /var/www/ai-trainer-staging/current/deploy/update.sh