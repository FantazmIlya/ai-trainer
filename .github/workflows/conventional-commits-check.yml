name: Conventional Commits Check

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  validate_commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve commit range
        id: range
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="$AFTER"
            else
              RANGE="$BEFORE..$AFTER"
            fi
          fi

          echo "commits_range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Commit range: $RANGE"

      - name: Validate commit messages
        run: |
          set -euo pipefail
          COMMITS_RANGE="${{ steps.range.outputs.commits_range }}" node scripts/validate-conventional-commits.mjs